name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix Kotlin duplicate classes in build.gradle
        run: |
          GRADLE_FILE="android/app/build.gradle"
          if [ -f "$GRADLE_FILE" ]; then
            # Add kotlin stdlib resolution strategy
            if ! grep -q "kotlin-stdlib" "$GRADLE_FILE"; then
              sed -i '/^android {/a\    configurations.all {\n        resolutionStrategy {\n            force "org.jetbrains.kotlin:kotlin-stdlib:1.9.25"\n            force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.25"\n            force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.25"\n        }\n    }' "$GRADLE_FILE"
            fi
          fi

      - name: Patch gradle.properties
        run: |
          PROPS="android/gradle.properties"
          # Remove conflicting kotlin entries if exist
          grep -v "kotlin.stdlib" "$PROPS" > /tmp/gradle.properties.tmp || true
          mv /tmp/gradle.properties.tmp "$PROPS" 2>/dev/null || true
          # Add correct settings
          cat >> "$PROPS" << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          kotlin.stdlib.default.dependency=false
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
          org.gradle.daemon=false
          EOF

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
