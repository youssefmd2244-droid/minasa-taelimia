name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix FileProvider (share crash)
        run: |
          set -e
          XML_DIR="android/app/src/main/res/xml"
          mkdir -p "$XML_DIR"
          cat > "$XML_DIR/file_paths.xml" << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths xmlns:android="http://schemas.android.com/apk/res/android">
              <cache-path name="cache" path="." />
              <files-path name="files" path="." />
              <external-path name="external_files" path="." />
              <external-cache-path name="external_cache" path="." />
          </paths>
          EOF

          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ] && ! grep -q "fileprovider" "$MANIFEST"; then
            python3 - << 'PYEOF'
          path = "android/app/src/main/AndroidManifest.xml"
          with open(path, "r", encoding="utf-8") as f:
              content = f.read()
          provider = (
              '        <provider\n'
              '            android:name="androidx.core.content.FileProvider"\n'
              '            android:authorities="${applicationId}.fileprovider"\n'
              '            android:exported="false"\n'
              '            android:grantUriPermissions="true">\n'
              '            <meta-data\n'
              '                android:name="android.support.FILE_PROVIDER_PATHS"\n'
              '                android:resource="@xml/file_paths" />\n'
              '        </provider>\n'
          )
          content = content.replace("</application>", provider + "    </application>")
          with open(path, "w", encoding="utf-8") as f:
              f.write(content)
          PYEOF
          fi

      - name: Fix Kotlin duplicate classes in build.gradle
        run: |
          GRADLE_FILE="android/app/build.gradle"
          if [ -f "$GRADLE_FILE" ]; then
            # لا تُثبِّت kotlin-stdlib على إصدار قديم (ده كان بيسبب اختفاء
            # كلاسات داخلية زي kotlin.coroutines.jvm.internal.SpillingKt
            # ويطيّح أي عملية Filesystem/Share تستخدم coroutines).
            # بدل كده، بنستبعد وحدتي jdk7/jdk8 القديمتين المكرَّرتين فقط
            # ونسيب kotlin-stdlib الأساسية تتحل بأحدث إصدار مطلوب طبيعيًا.
            if ! grep -q "kotlin-stdlib-jdk7" "$GRADLE_FILE"; then
              sed -i '/^android {/a\    configurations.all {\n        exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"\n        exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"\n    }' "$GRADLE_FILE"
            fi
          fi

      - name: Patch gradle.properties
        run: |
          PROPS="android/gradle.properties"
          # Remove conflicting kotlin entries if exist
          grep -v "kotlin.stdlib" "$PROPS" > /tmp/gradle.properties.tmp || true
          mv /tmp/gradle.properties.tmp "$PROPS" 2>/dev/null || true
          # Add correct settings
          cat >> "$PROPS" << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
          org.gradle.daemon=false
          EOF

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
