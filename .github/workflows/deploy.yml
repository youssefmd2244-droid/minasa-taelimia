name: 🚀 Deploy EduVerse

on:
  push:
    branches: [main]           # كل push على main → deploy تلقائي
  workflow_dispatch:            # أو تشغيل يدوي من GitHub

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true     # إلغاء deploy قديم لو في واحد جديد بدأ

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Build + Deploy to GitHub Pages
  # ─────────────────────────────────────────────────────────────
  deploy-web:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      # ── متغيرات البيئة من GitHub Secrets ──────────────────────
      # اضف في مستودعك: Settings → Secrets → Actions:
      #   VITE_SUPABASE_URL   = https://xxxxx.supabase.co
      #   VITE_SUPABASE_ANON_KEY = eyJhbGci...
      - name: 🔑 Write .env.production
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env.production
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env.production

      - name: 🏗️ Build
        run: npm run build
        env:
          NODE_ENV: production

      # GitHub Pages يحتاج هذا الملف لـ SPA routing (React + hash)
      - name: 📄 Add 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: 🌐 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─────────────────────────────────────────────────────────────
  # 2. Build Android APK (يشتغل بعد deploy الويب)
  # ─────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: deploy-web          # ينتظر نجاح deploy الويب أولاً
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: ☕ Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: 🟢 Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔑 Write .env.production
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env.production
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env.production

      - name: 🏗️ Build web
        run: npm run build

      - name: ➕ Add Android platform
        run: npx cap add android || true

      - name: 🔄 Sync Capacitor
        run: npx cap sync android

      - name: 🔧 Fix FileProvider (share crash)
        run: |
          set -e
          XML_DIR="android/app/src/main/res/xml"
          mkdir -p "$XML_DIR"
          cat > "$XML_DIR/file_paths.xml" << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths xmlns:android="http://schemas.android.com/apk/res/android">
              <cache-path name="cache" path="." />
              <files-path name="files" path="." />
              <external-path name="external_files" path="." />
              <external-cache-path name="external_cache" path="." />
          </paths>
          EOF

          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ] && ! grep -q "fileprovider" "$MANIFEST"; then
            python3 - << 'PYEOF'
          path = "android/app/src/main/AndroidManifest.xml"
          with open(path, "r", encoding="utf-8") as f:
              content = f.read()
          provider = (
              '        <provider\n'
              '            android:name="androidx.core.content.FileProvider"\n'
              '            android:authorities="${applicationId}.fileprovider"\n'
              '            android:exported="false"\n'
              '            android:grantUriPermissions="true">\n'
              '            <meta-data\n'
              '                android:name="android.support.FILE_PROVIDER_PATHS"\n'
              '                android:resource="@xml/file_paths" />\n'
              '        </provider>\n'
          )
          content = content.replace("</application>", provider + "    </application>")
          with open(path, "w", encoding="utf-8") as f:
              f.write(content)
          PYEOF
          fi

      - name: 🔧 Fix Kotlin duplicate classes
        run: |
          GRADLE_FILE="android/app/build.gradle"
          if [ -f "$GRADLE_FILE" ] && ! grep -q "kotlin-stdlib" "$GRADLE_FILE"; then
            sed -i '/^android {/a\    configurations.all {\n        resolutionStrategy {\n            force "org.jetbrains.kotlin:kotlin-stdlib:1.9.25"\n            force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.25"\n            force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.25"\n        }\n    }' "$GRADLE_FILE"
          fi

      - name: 🔧 Patch gradle.properties
        run: |
          PROPS="android/gradle.properties"
          grep -v "kotlin.stdlib" "$PROPS" > /tmp/gradle.properties.tmp || true
          mv /tmp/gradle.properties.tmp "$PROPS" 2>/dev/null || true
          cat >> "$PROPS" << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          kotlin.stdlib.default.dependency=false
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
          org.gradle.daemon=false
          EOF

      - name: 🤖 Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EduVerse-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error
